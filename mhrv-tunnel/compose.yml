services:

  tunnel:
    image: ghcr.io/therealaleph/mhrv-tunnel-node:latest
    restart: unless-stopped
    environment:
      TUNNEL_AUTH_KEY: ${TUNNEL_AUTH_KEY}
    expose:
      - "8080"
    networks:
      - web

  caddy:
    image: caddy:latest
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web
    depends_on:
      - tunnel

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
