services:

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./site:/srv
      - ./data:/data
      - ./config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - web

networks:
  web:
    external: true
